<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI Pro | En Kararlı Sürüm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --dark: #0b1120; }
        body { background: #0b1120; color: white; font-family: sans-serif; padding-top: 50px; }
        .glass-card { background: rgba(30, 41, 59, 0.9); border-radius: 20px; padding: 25px; border: 1px solid #4facfe; }
        .input-box { background: #1e293b; border-radius: 10px; padding: 10px; margin-bottom: 15px; border: 1px solid #475569; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-go { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: bold; width: 100%; padding: 15px; border-radius: 10px; }
        #sonuc { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 20px; margin-top: 20px; display: none; line-height: 1.6; }
        .preview-img { max-width: 100%; max-height: 250px; display: none; margin: 10px auto; border-radius: 10px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container" style="max-width: 600px;">
    <div id="authSection" class="glass-card text-center">
        <h3>Giriş Yap</h3>
        <input type="email" id="email" class="form-control mb-2" placeholder="E-posta">
        <input type="password" id="password" class="form-control mb-3" placeholder="Şifre">
        <button onclick="handleLogin()" class="btn-go">GİRİŞ</button>
    </div>

    <div id="appSection" class="glass-card hidden" style="display:none">
        <h4 class="text-center mb-4">Görsel Gümrük Analizi</h4>
        <div class="input-box"><input type="text" id="ulke" placeholder="Menşe Ülke (Örn: Çin)"></div>
        
        <div class="input-box text-center" onclick="document.getElementById('fotoInput').click()" style="cursor:pointer; border: 2px dashed #00f2fe;">
            <p class="m-0">📸 Fotoğraf Seç</p>
            <input type="file" id="fotoInput" style="display:none" accept="image/*" onchange="previewFile()">
            <img id="preview" class="preview-img">
        </div>

        <button onclick="analizEt()" id="btn" class="btn-go mt-3">ANALİZİ BAŞLAT</button>

        <div id="sonuc">
            <h6 style="color:var(--primary)">Analiz Sonucu:</h6>
            <div id="rapor" class="small"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Taze Key'in
    const geminiKey = "AIzaSyAXbBgWbTAu3VXGXWYzFlJYg36uDo-lmY4"; 

    function previewFile() {
        const file = document.getElementById('fotoInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => { 
                document.getElementById('preview').src = reader.result; 
                document.getElementById('preview').style.display = 'block'; 
            }
            reader.readAsDataURL(file);
        }
    }

    async function handleLogin() {
        const { error } = await _supabase.auth.signInWithPassword({ 
            email: document.getElementById('email').value, 
            password: document.getElementById('password').value 
        });
        if (error) alert("Giriş başarısız!"); else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
        }
    }

    async function analizEt() {
        const ulke = document.getElementById('ulke').value;
        const file = document.getElementById('fotoInput').files[0];
        const btn = document.getElementById('btn');
        if(!ulke || !file) return alert("Eksik bilgi!");

        btn.disabled = true; btn.innerText = "Sistem Sorgulanıyor...";

        try {
            // Base64 alalım
            const base64Data = document.getElementById('preview').src.split(',')[1];
            
            const payload = {
                contents: [{
                    parts: [
                        { text: `Gümrük uzmanı olarak bu ${ulke} menşeli ürünü incele. GTİP ve vergi oranlarını yaz.` },
                        { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                    ]
                }]
            };

            // DİKKAT: En garantici URL ve model ikilisi
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro-vision:generateContent?key=${geminiKey}`;

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            
            if (data.error) {
                // Eğer pro-vision da hata verirse, anahtarda bir kısıtlama var demektir.
                throw new Error(data.error.message);
            }

            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('rapor').innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            document.getElementById('sonuc').style.display = 'block';

        } catch (e) {
            alert("Kritik Hata: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = "ANALİZİ BAŞLAT";
        }
    }

    window.onload = checkUser;
</script>
</body>
</html>
