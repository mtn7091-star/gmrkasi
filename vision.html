<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI | New Key Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --dark: #0b1120; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: white; font-family: sans-serif; padding-top: 50px; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.9); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-box { background: #1e293b; border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid #475569; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-analiz { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: bold; width: 100%; padding: 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        .btn-analiz:hover { transform: scale(1.02); opacity: 0.9; }
        #sonuc { background: rgba(0,0,0,0.6); border-radius: 15px; padding: 20px; margin-top: 20px; display: none; border-left: 5px solid var(--primary); }
        .preview-img { max-width: 100%; max-height: 200px; display: none; margin: 10px auto; border-radius: 10px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="container" style="max-width: 600px;">
    <div id="authSection" class="glass-card text-center">
        <h2 class="fw-bold mb-4">Customs<span style="color:var(--primary)">AI</span></h2>
        <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
        <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
        <button onclick="handleLogin()" class="btn-analiz w-100">GİRİŞ YAP</button>
    </div>

    <div id="appSection" class="glass-card" style="display:none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="m-0">Gümrük Analiz</h4>
            <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm">Çıkış</button>
        </div>
        
        <div class="input-box"><small class="text-info">ÜRÜN ADI</small><input type="text" id="urun" placeholder="Örn: Güneş Paneli"></div>
        <div class="input-box"><small class="text-info">MENŞE ÜLKE</small><input type="text" id="ulke" placeholder="Örn: Çin"></div>

        <div class="input-box text-center" style="border: 2px dashed #4facfe; cursor: pointer;" onclick="document.getElementById('fotoInput').click()">
            <p class="small m-0">📸 Fotoğraf Ekle (Opsiyonel)</p>
            <input type="file" id="fotoInput" style="display:none" accept="image/*" onchange="previewFile()">
            <img id="preview" class="preview-img">
        </div>

        <button onclick="analizEt()" id="btn" class="btn-analiz w-100 mt-3">ANALİZİ BAŞLAT</button>

        <div id="sonuc">
            <h6 style="color:var(--primary)">📋 Gümrük Raporu:</h6>
            <div id="rapor" class="small lh-lg"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Taze anahtarın buraya gömüldü
    const geminiKey = "AIzaSyB3bMCCNqh6asNhtHbXi-tvBt9s18DEIE4"; 

    function previewFile() {
        const file = document.getElementById('fotoInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => { 
                document.getElementById('preview').src = reader.result; 
                document.getElementById('preview').style.display = 'block'; 
            }
            reader.readAsDataURL(file);
        }
    }

    async function handleLogin() {
        const { error } = await _supabase.auth.signInWithPassword({ 
            email: document.getElementById('email').value, 
            password: document.getElementById('password').value 
        });
        if (error) alert("Hata: Giriş yapılamadı!"); else checkUser();
    }

    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
        }
    }

    async function analizEt() {
        const urun = document.getElementById('urun').value;
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('btn');
        const file = document.getElementById('fotoInput').files[0];

        if(!urun || !ulke) return alert("Bilgileri eksiksiz gir hacı!");

        btn.disabled = true; btn.innerText = "Sorgulanıyor...";

        try {
            let payload;
            const prompt = `Sen profesyonel bir gümrük müşavirisin. Ürün: ${urun}, Menşe: ${ulke}. Bu ürünün tahmini GTİP kodunu, Türkiye vergi oranlarını ve gerekli belgeleri listele.`;
            
            // Eğer fotoğraf varsa Vision kullanmayı dene, yoksa sadece metin
            if (file) {
                const base64Data = document.getElementById('preview').src.split(',')[1];
                payload = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                        ]
                    }]
                };
            } else {
                payload = { contents: [{ parts: [{ text: prompt }] }] };
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`;

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('rapor').innerHTML = text
                .replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--primary)">$1</b>')
                .replace(/\n/g, "<br>");
            document.getElementById('sonuc').style.display = 'block';

        } catch (e) {
            alert("Hata: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = "ANALİZİ BAŞLAT";
        }
    }

    window.onload = checkUser;
</script>
</body>
</html>
