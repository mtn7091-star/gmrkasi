<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI | Vision Lab (Final)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0b1120; --text-bright: #f8fafc; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: var(--text-bright); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 40px 0; }
        .glass-card { backdrop-filter: blur(15px); background: rgba(30, 41, 59, 0.8); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .btn-vision { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 800; border-radius: 12px; padding: 15px; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .preview-area { border: 2px dashed #475569; border-radius: 20px; padding: 30px; cursor: pointer; transition: 0.3s; margin-bottom: 25px; background: rgba(15, 23, 42, 0.4); text-align: center; }
        #previewImg { max-width: 100%; max-height: 350px; border-radius: 15px; display: none; margin: 0 auto; border: 2px solid var(--primary); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #475569; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        #sonuc { display: none; background: rgba(15, 23, 42, 0.95); border-radius: 20px; padding: 25px; border-left: 6px solid var(--primary); margin-top: 30px; }
        .loader { display: none; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,.1); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 600; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 750px;">
    <div class="text-center">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left me-2"></i> Ana Panele Dön</a>
        <h2 class="fw-bold">Vision <span style="color:var(--primary)">Lab</span></h2>
        <p class="opacity-75 small">Görsel Analiz Sistemi</p>
    </div>

    <div class="glass-card">
        <div class="preview-area" onclick="document.getElementById('fileInput').click()">
            <div id="uploadPrompt">
                <i class="fa-solid fa-camera fa-3x mb-3 text-info"></i>
                <h6>Görsel Seç</h6>
            </div>
            <img id="previewImg">
            <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="input-box">
            <small class="text-info d-block mb-1">MENŞE ÜLKE</small>
            <input type="text" id="ulke" placeholder="Örn: Almanya">
        </div>

        <button id="analizBtn" onclick="visionAnaliz()" class="btn btn-vision">ANALİZ ET</button>
        <div class="loader" id="loader"></div>

        <div id="sonuc">
            <h5 class="text-info-bright mb-3">AI Raporu</h5>
            <div id="rapor" class="small lh-lg" style="color: #cbd5e1;"></div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBuRZRF-9-5XpZlBnd_p8I1g2sF__BNBIg";

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('uploadPrompt').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    async function visionAnaliz() {
        const fileInput = document.getElementById('fileInput');
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('analizBtn');
        const loader = document.getElementById('loader');
        const sonucDiv = document.getElementById('sonuc');
        const file = fileInput.files[0];

        if (!file || !ulke) {
            alert("Eksik bilgi!");
            return;
        }

        btn.disabled = true;
        loader.style.display = "block";
        sonucDiv.style.display = "none";

        try {
            const base64Data = document.getElementById('previewImg').src.split(',')[1];
            
            // PAYLOAD: En sade ve garantici yapı
            const payload = {
                contents: [{
                    parts: [
                        { text: `Gümrük müşaviri olarak bu ${ulke} menşeli görseli analiz et.` },
                        { inline_data: { mime_type: file.type, data: base64Data } }
                    ]
                }]
            };

            // URL: v1beta yerine v1 kullanarak ve models/ ön ekini URL içinde vererek çağırıyoruz
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.error) {
                // Eğer v1 hata verirse, manuel olarak v1beta'yı dene
                console.warn("v1 hata verdi, v1beta deneniyor...");
                const urlBeta = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const resBeta = await fetch(urlBeta, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const dataBeta = await resBeta.json();
                
                if (dataBeta.error) {
                    alert("Kritik Hata: " + dataBeta.error.message);
                    return;
                }
                showResult(dataBeta);
            } else {
                showResult(data);
            }

        } catch (error) {
            alert("Bağlantı hatası!");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    function showResult(data) {
        if (data.candidates && data.candidates[0].content) {
            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('rapor').innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            document.getElementById('sonuc').style.display = 'block';
        }
    }
</script>
</body>
</html>
