<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI | Vision Lab (1.5 Flash)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0b1120; --text-bright: #f8fafc; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: var(--text-bright); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 40px 0; transition: 0.3s; }
        .glass-card { backdrop-filter: blur(15px); background: rgba(30, 41, 59, 0.8); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .btn-vision { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 800; border-radius: 12px; padding: 15px; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-vision:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4); }
        .preview-area { border: 2px dashed #475569; border-radius: 20px; padding: 30px; cursor: pointer; transition: 0.3s; margin-bottom: 25px; background: rgba(15, 23, 42, 0.4); overflow: hidden; }
        .preview-area:hover { border-color: var(--primary); background: rgba(0, 242, 254, 0.05); }
        #previewImg { max-width: 100%; max-height: 350px; border-radius: 15px; display: none; margin: 0 auto; border: 2px solid var(--primary); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #475569; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        #sonuc { display: none; background: rgba(15, 23, 42, 0.95); border-radius: 20px; padding: 25px; border-left: 6px solid var(--primary); margin-top: 30px; }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .loader { display: none; margin: 10px auto; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container" style="max-width: 750px;">
    <div class="text-center mb-4">
        <a href="index.html" class="back-link"><i class="fa-solid fa-chevron-left me-1"></i> Ana Panele Dön</a>
        <h2 class="fw-bold mt-3">Vision <span style="color:var(--primary)">Lab</span></h2>
        <p class="small opacity-75">Gemini 1.5 Flash Stabil Motoru Aktif</p>
    </div>

    <div class="glass-card">
        <div class="preview-area text-center" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div id="uploadPrompt">
                <i class="fa-solid fa-camera-viewfinder fa-3x mb-3 text-info"></i>
                <h6 class="fw-bold">Görseli Buraya Bırakın veya Seçin</h6>
                <p class="small opacity-50">Ürün resmi, fatura veya teknik çizim</p>
            </div>
            <img id="previewImg">
            <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="input-box">
            <small class="text-info d-block mb-1">MENŞE ÜLKE (ZORUNLU)</small>
            <input type="text" id="ulke" placeholder="Örn: Vietnam">
        </div>

        <button id="analizBtn" onclick="visionAnaliz()" class="btn btn-vision">ANALİZİ BAŞLAT</button>
        <div class="loader" id="loadingIcon"></div>

        <div id="sonuc">
            <h5 class="text-info mb-3"><i class="fa-solid fa-magnifying-glass-chart me-2"></i> Teknik Analiz Sonucu</h5>
            <div id="rapor" class="small lh-lg" style="color: #cbd5e1;"></div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBuRZRF-9-5XpZlBnd_p8I1g2sF__BNBIg";
    const MODEL_NAME = "gemini-1.5-flash"; // En stabil Vision modeli

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            if (file.size > 15 * 1024 * 1024) {
                alert("Dosya çok büyük bro! 15MB altı bir görsel seç.");
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('uploadPrompt').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    async function visionAnaliz() {
        const fileInput = document.getElementById('fileInput');
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('analizBtn');
        const loader = document.getElementById('loadingIcon');
        const file = fileInput.files[0];

        if (!file || !ulke) {
            alert("Eksik bilgi! Lütfen görsel seçin ve ülke yazın.");
            return;
        }

        btn.disabled = true;
        btn.style.opacity = "0.5";
        loader.style.display = "block";
        document.getElementById('sonuc').style.display = "none";

        const base64Data = document.getElementById('previewImg').src.split(',')[1];

        // Gümrük Müşaviri Talimatı
        const promptText = `Sen kıdemli bir gümrük müşavirisin. Fotoğraftaki ${ulke} menşeli ürünü/belgeyi analiz et. 
        Şunları kesinlikle belirt:
        - Tahmini 12 haneli GTİP Kodu
        - Ürün Tanımı ve Sınıflandırma Gerekçesi
        - İthalat Rejimi (Gümrük Vergisi, KDV, Varsa Ek Mali Yükümlülükler)
        - Gerekli Kurum İzinleri (TSE, Tarım, CE vb.)
        Profesyonel ve net bir dil kullan.`;

        const payload = {
            contents: [{
                parts: [
                    { text: promptText },
                    { inline_data: { mime_type: file.type, data: base64Data } }
                ]
            }]
        };

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const text = data.candidates[0].content.parts[0].text;
            
            document.getElementById('rapor').innerHTML = text
                .replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--primary)">$1</b>')
                .replace(/\n/g, '<br>');
            
            document.getElementById('sonuc').style.display = 'block';
        } catch (e) {
            console.error(e);
            alert("Hata: " + (e.message.includes("quota") ? "Dakikalık kota doldu, biraz bekle bro." : "Bağlantı hatası!"));
        } finally {
            btn.disabled = false;
            btn.style.opacity = "1";
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
