<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI Pro | Final Vision Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --dark: #0b1120; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding-top: 50px; }
        .glass-card { background: rgba(30, 41, 59, 0.8); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #475569; border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-premium { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: bold; width: 100%; padding: 12px; border-radius: 10px; }
        #sonuc { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 20px; margin-top: 20px; border-left: 5px solid var(--primary); display: none; }
        .hidden { display: none !important; }
        .preview-img { max-width: 100%; max-height: 250px; display: none; margin: 10px auto; border-radius: 10px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container" style="max-width: 600px;">
    <div id="authSection" class="glass-card text-center">
        <h4>CustomsAI Giriş</h4>
        <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
        <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
        <button onclick="handleLogin()" class="btn-premium">GİRİŞ YAP</button>
    </div>

    <div id="appSection" class="glass-card hidden">
        <h4 class="text-center mb-3">Görsel Analiz</h4>
        <input type="text" id="ulke" class="form-control mb-3" placeholder="Menşe Ülke" style="background:#1e293b; color:white; border:1px solid #475569;">
        
        <div class="input-box text-center" onclick="document.getElementById('fotoInput').click()" style="cursor:pointer; border: 2px dashed #4facfe;">
            <p class="m-0 small">Fotoğraf Yükle</p>
            <input type="file" id="fotoInput" class="hidden" accept="image/*" onchange="previewFile()">
            <img id="preview" class="preview-img">
        </div>

        <button onclick="analizEt()" id="btn" class="btn-premium mt-3">ANALİZİ BAŞLAT</button>

        <div id="sonuc">
            <h6 style="color:var(--primary)">AI Raporu:</h6>
            <div id="rapor" class="small lh-lg"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Taze Key
    const geminiKey = "AIzaSyAXbBgWbTAu3VXGXWYzFlJYg36uDo-lmY4"; 

    async function resizeImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; 
                    canvas.height = img.height * (600 / img.width);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
        });
    }

    function previewFile() {
        const file = document.getElementById('fotoInput').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => { 
                document.getElementById('preview').src = reader.result; 
                document.getElementById('preview').style.display = 'block'; 
            }
            reader.readAsDataURL(file);
        }
    }

    async function handleLogin() {
        const { error } = await _supabase.auth.signInWithPassword({ 
            email: document.getElementById('email').value, 
            password: document.getElementById('password').value 
        });
        if (error) alert("Giriş hatası!"); else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
        }
    }

    async function analizEt() {
        const ulke = document.getElementById('ulke').value;
        const file = document.getElementById('fotoInput').files[0];
        const btn = document.getElementById('btn');
        if(!ulke || !file) return alert("Eksik bilgi!");

        btn.disabled = true; btn.innerText = "İnceleniyor...";

        try {
            const resizedBase64 = await resizeImage(file);
            const pureBase64 = resizedBase64.split(',')[1];
            
            const payload = {
                contents: [{
                    parts: [
                        { text: `Gümrük müşaviri olarak bu ${ulke} menşeli ürünü analiz et. GTİP ve vergi oranlarını yaz.` },
                        { inline_data: { mime_type: "image/jpeg", data: pureBase64 } }
                    ]
                }]
            };

            // KRİTİK DEĞİŞİKLİK: gemini-1.5-flash-latest kullanımı
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${geminiKey}`;

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('rapor').innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, "<br>");
            document.getElementById('sonuc').style.display = 'block';

        } catch (e) {
            alert("Hata: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = "ANALİZİ BAŞLAT";
        }
    }

    window.onload = checkUser;
</script>
</body>
</html>
