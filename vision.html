<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CustomsAI | Vision Lab (Orijinal Kod)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b1120; color: white; padding: 40px; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border-radius: 20px; padding: 30px; border: 1px solid #4facfe; max-width: 600px; margin: auto; }
        #preview { max-width: 100%; border-radius: 10px; margin: 20px 0; display: none; border: 2px solid #00f2fe; }
        .btn-analiz { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: bold; width: 100%; padding: 15px; border-radius: 10px; }
        #rapor { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; display: none; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card shadow-lg text-center">
    <h3 style="color:#00f2fe">Vision Lab</h3>
    <p class="small opacity-75">Orijinal Çalışan Sürüm</p>
    
    <input type="file" id="fileInput" class="form-control my-3" accept="image/*" onchange="showPreview(this)">
    <img id="preview">
    
    <input type="text" id="ulke" class="form-control mb-3" placeholder="Menşe Ülke (Örn: Çin)">
    
    <button id="btn" onclick="visionAnaliz()" class="btn-analiz">ANALİZİ BAŞLAT</button>

    <div id="rapor"></div>
</div>

<script>
    // Yeni taze anahtarın
    const API_KEY = "AIzaSyAXbBgWbTAu3VXGXWYzFlJYg36uDo-lmY4"; 

    function showPreview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function visionAnaliz() {
        const file = document.getElementById('fileInput').files[0];
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('btn');
        const raporDiv = document.getElementById('rapor');

        if (!file || !ulke) return alert("Dosya ve ülke seçmelisin hacı!");

        btn.disabled = true;
        btn.innerText = "İnceleniyor...";

        try {
            const base64Data = document.getElementById('preview').src.split(',')[1];
            
            // O GÜNKÜ ÇALIŞAN PAYLOAD YAPISI
            const payload = {
                "contents": [{
                    "parts": [
                        { "text": `Sen uzman bir gümrük müşavirisin. Bu fotoğrafı analiz et. Ürün ${ulke} menşeli. GTİP kodu tahmini yap ve vergi bilgilerini ver.` },
                        {
                            "inline_data": {
                                "mime_type": file.type,
                                "data": base64Data
                            }
                        }
                    ]
                }]
            };

            // O GÜNKÜ ÇALIŞAN URL
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (data.error) {
                raporDiv.innerHTML = `<span style="color:red">Hata: ${data.error.message}</span>`;
            } else {
                const resultText = data.candidates[0].content.parts[0].text;
                raporDiv.innerHTML = resultText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            }
            raporDiv.style.display = 'block';

        } catch (e) {
            alert("Bağlantı koptu, tekrar dene!");
        } finally {
            btn.disabled = false;
            btn.innerText = "ANALİZİ BAŞLAT";
        }
    }
</script>
</body>
</html>
