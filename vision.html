<script>
    // 1. AYARLAR
    const API_KEY = "AIzaSyBuRZRF-9-5XpZlBnd_p8I1g2sF__BNBIg";
    const MODEL_NAME = "gemini-1.5-flash"; 

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('uploadPrompt').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    async function visionAnaliz() {
        const fileInput = document.getElementById('fileInput');
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('analizBtn');
        const loader = document.getElementById('loader');
        const sonucDiv = document.getElementById('sonuc');
        const file = fileInput.files[0];

        if (!file || !ulke) {
            alert("Lütfen görsel seçin ve ülke yazın!");
            return;
        }

        btn.disabled = true;
        loader.style.display = "block";
        sonucDiv.style.display = "none";

        try {
            const base64Data = document.getElementById('previewImg').src.split(',')[1];
            
            // PAYLOAD: Google'ın en standart kabul ettiği yapı
            const payload = {
                contents: [{
                    parts: [
                        { text: `Gümrük müşaviri gibi davran. Bu ${ulke} menşeli ürünü analiz et.` },
                        { inline_data: { mime_type: file.type, data: base64Data } }
                    ]
                }]
            };

            // URL: v1beta üzerinden models/ ön eki ile tam yol
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            // ÖNEMLİ: Eğer hata gelirse tam olarak ne olduğunu görelim
            if (data.error) {
                console.error("KRİTİK HATA:", data.error);
                alert("Google Hatası: " + data.error.message + " (Kod: " + data.error.code + ")");
                return;
            }

            if (data.candidates && data.candidates[0].content) {
                const text = data.candidates[0].content.parts[0].text;
                document.getElementById('rapor').innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                sonucDiv.style.display = 'block';
            }

        } catch (error) {
            alert("Bağlantı kesildi bro! Tekrar dene.");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>
