<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI | Vision Lab (Beta)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0b1120; --text-bright: #f8fafc; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: var(--text-bright); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 50px 0; }
        .glass-card { backdrop-filter: blur(15px); background: rgba(30, 41, 59, 0.8); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .btn-vision { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 800; border-radius: 12px; padding: 15px; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-vision:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4); }
        .preview-area { border: 2px dashed #475569; border-radius: 20px; padding: 40px; cursor: pointer; transition: 0.3s; margin-bottom: 25px; background: rgba(15, 23, 42, 0.4); }
        .preview-area:hover { border-color: var(--primary); background: rgba(0, 242, 254, 0.05); }
        #previewImg { max-width: 100%; max-height: 350px; border-radius: 15px; display: none; margin: 0 auto; border: 2px solid var(--primary); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #475569; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        #sonuc { display: none; background: rgba(15, 23, 42, 0.95); border-radius: 20px; padding: 25px; border-left: 6px solid var(--primary); margin-top: 30px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
    <div class="text-center mb-5">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left me-2"></i> Ana Panele Dön</a>
        <h1 class="fw-bold mt-4">Vision <span style="color:var(--primary)">Lab</span> <small class="fs-6 opacity-50">v2.5 Flash</small></h1>
        <p class="opacity-75">Ürün fotoğrafı veya etiket yükleyerek saniyeler içinde GTİP analizi alın.</p>
    </div>

    <div class="glass-card">
        <div class="preview-area text-center" onclick="document.getElementById('fileInput').click()">
            <div id="uploadPrompt">
                <i class="fa-solid fa-camera-retro fa-4x mb-3 text-info"></i>
                <h5 class="fw-bold text-white">Görsel Seç veya Kamerayı Aç</h5>
                <p class="small opacity-50 m-0">Ürün, Barkod veya Belge fotoğrafı (Max 20MB)</p>
            </div>
            <img id="previewImg">
            <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="input-box">
            <small class="text-info d-block mb-1">MENŞE ÜLKE</small>
            <input type="text" id="ulke" placeholder="Örn: Güney Kore">
        </div>

        <button id="analizBtn" onclick="visionAnaliz()" class="btn btn-vision">Yapay Zeka ile Analiz Et</button>

        <div id="sonuc">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="text-info-bright m-0"><i class="fa-solid fa-robot me-2"></i> Vision Analiz Raporu</h5>
                <button onclick="window.print()" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-print"></i></button>
            </div>
            <div id="rapor" class="small lh-lg" style="color: #cbd5e1;"></div>
        </div>
    </div>

    <footer class="text-center mt-5 opacity-50 small">
        © 2026 CustomsAI Vision Lab - Her hakkı saklıdır.
    </footer>
</div>

<script>
    const API_KEY = "AIzaSyBuRZRF-9-5XpZlBnd_p8I1g2sF__BNBIg";

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('uploadPrompt').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    async function visionAnaliz() {
        const fileInput = document.getElementById('fileInput');
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('analizBtn');
        const file = fileInput.files[0];

        if (!file || !ulke) return alert("Lütfen bir fotoğraf seçin ve ülkeyi belirtin bro!");

        btn.disabled = true; btn.innerText = "2.5 FLASH ANALİZ EDİYOR...";

        const base64Data = document.getElementById('previewImg').src.split(',')[1];

        // Gümrük Müşaviri Rolü (Vision Prompt)
        const promptText = `Sen uzman bir gümrük müşavirisin. Fotoğraftaki ${ulke} menşeli ürünü analiz et. Şunları belirt: 
        1. Tahmini GTİP Kodu (En az 8 haneli), 
        2. Gümrük Vergisi ve KDV Tahmini, 
        3. İthalatta kritik olan belgeler (TSE, Gözetim, Kayıt Belgesi vb.),
        4. Analiz gerekçesi.`;

        const payload = {
            contents: [{
                parts: [
                    { text: promptText },
                    { inline_data: { mime_type: file.type, data: base64Data } }
                ]
            }]
        };

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            
            document.getElementById('rapor').innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--primary)">$1</b>').replace(/\n/g, '<br>');
            document.getElementById('sonuc').style.display = 'block';
        } catch (e) {
            alert("Model şu an yoğun olabilir, lütfen tekrar dene bro.");
        } finally {
            btn.disabled = false; btn.innerText = "Yapay Zeka ile Analiz Et";
        }
    }
</script>
</body>
</html>
