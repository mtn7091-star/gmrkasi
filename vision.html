<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI Pro | Ultimate AI Vision</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0b1120; --text-bright: #f8fafc; }
        
        /* TEMEL TASARIM */
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: var(--text-bright); font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; padding-top: 50px; transition: 0.3s; }
        .glass-card { backdrop-filter: blur(15px); background: rgba(30, 41, 59, 0.8); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); transition: 0.3s; }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #475569; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        
        /* AYDINLIK TEMA */
        body.light-mode { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); color: #1e293b; }
        body.light-mode .glass-card { background: rgba(255, 255, 255, 0.9); color: #1e293b; border: 1px solid rgba(0,0,0,0.1); }
        body.light-mode .input-box { background: #ffffff; border-color: #cbd5e1; }
        body.light-mode .input-box input { color: #1e293b; }
        body.light-mode .marketing-text { color: #475569 !important; }

        /* BUTONLAR VE ÖZEL ALANLAR */
        .btn-premium { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 800; border-radius: 12px; padding: 15px; transition: 0.3s; text-transform: uppercase; }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4); }
        .evrak-box { background: rgba(0, 242, 254, 0.1); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px dashed var(--primary); }
        .preview-img { max-width: 180px; border-radius: 12px; margin: 15px auto; display: none; border: 2px solid var(--primary); }
        .hidden { display: none !important; }
        .feature-icon { color: var(--primary); font-size: 2rem; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <div class="text-center mb-5">
            <h1 class="fw-bold">CustomsAI <span style="color:var(--primary)">Pro</span></h1>
            <p class="marketing-text">Yapay Zeka ve Görsel Analiz ile Gümrükleme 4.0</p>
        </div>
        <div class="row g-4 justify-content-center">
            <div class="col-md-5">
                <div class="glass-card text-center h-100 border-info">
                    <i class="fa-solid fa-bolt feature-icon"></i>
                    <h4 class="fw-bold">Hızlı Deneme</h4>
                    <p class="small marketing-text">Kayıt olmadan temel GTİP öğrenin.</p>
                    <div class="input-box"><input type="text" id="freeUrun" placeholder="Ürün (Örn: Drone)"></div>
                    <div class="input-box"><input type="text" id="freeUlke" placeholder="Ülke"></div>
                    <button onclick="freeAnaliz()" id="freeBtn" class="btn btn-outline-info w-100 p-3 fw-bold mb-3">ANINDA SORGULA</button>
                    <div id="freeSonuc" class="mt-2 hidden text-start small border-top border-secondary pt-2">
                        <div id="freeRapor" class="marketing-text"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="glass-card text-center h-100">
                    <i class="fa-solid fa-user-shield feature-icon"></i>
                    <h4 class="fw-bold">Müşavir Girişi</h4>
                    <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
                    <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
                    <button onclick="handleLogin()" id="loginBtn" class="btn btn-premium w-100 mb-3">GİRİŞ YAP</button>
                    <button onclick="handleSignUp()" class="btn btn-outline-secondary w-100 btn-sm">Hesap Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <div id="appSection" class="glass-card hidden" style="max-width: 950px; margin: auto;">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3 border-secondary">
            <h4 class="m-0 fw-bold"><i class="fa-solid fa-eye me-2" style="color:var(--primary)"></i>AI Görsel Analiz</h4>
            <div class="d-flex align-items-center">
                <button onclick="toggleTheme()" class="btn btn-outline-info btn-sm me-2"><i id="themeIcon" class="fa-solid fa-sun"></i></button>
                <div class="me-3 small text-info d-none d-md-block" id="userMail"></div>
                <button onclick="handleLogout()" class="btn btn-danger btn-sm">Çıkış</button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6"><div class="input-box"><small class="text-info d-block mb-1">ÜRÜN (OPSİYONEL)</small><input type="text" id="urun" placeholder="Veya fotoğraf yükleyin"></div></div>
            <div class="col-md-6"><div class="input-box"><small class="text-info d-block mb-1">MENŞE ÜLKE</small><input type="text" id="ulke" placeholder="Örn: Çin"></div></div>
        </div>

        <div class="input-box text-center p-4" style="border: 2px dashed #475569; cursor: pointer;" onclick="document.getElementById('fotoInput').click()">
            <i class="fa-solid fa-camera fa-2x mb-2 text-info"></i>
            <p class="small m-0">Ürün Fotoğrafı / Etiket / Fatura Yükle (Vision AI)</p>
            <input type="file" id="fotoInput" class="hidden" accept="image/*" onchange="previewFile()">
            <img id="preview" class="preview-img">
        </div>

        <button onclick="analizEt()" id="analizBtn" class="btn btn-premium w-100 mt-2">ANALİZİ BAŞLAT</button>

        <div id="sonuc" class="mt-4 p-3 rounded" style="background: rgba(15, 23, 42, 0.5); display:none;">
            <h5 style="color:var(--primary)"><i class="fa-solid fa-robot me-2"></i> Profesyonel AI Raporu</h5>
            <div id="raporIcerik" class="marketing-text"></div>
        </div>
    </div>

    <footer class="text-center mt-5 pb-5">
        <p class="small marketing-text opacity-50">© 2026 CustomsAI Pro. Tüm Hakları Saklıdır.</p>
    </footer>
</div>

<script>
    const API_KEY = "AIzaSyAXbBgWbTAu3VXGXWYzFlJYg36uDo-lmY4"; 

    // FOTOĞRAFI OTOMATİK KÜÇÜLTEN SİHİRLİ FONKSİYON
    async function resizeImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // İdeal genişlik
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // Kaliteyi %70'e düşürerek boyutu iyice optimize ediyoruz
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    function showPreview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function visionAnaliz() {
        const file = document.getElementById('fileInput').files[0];
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('btn');
        const raporDiv = document.getElementById('rapor');

        if (!file || !ulke) return alert("Dosya ve ülke seçmelisin hacı!");

        btn.disabled = true;
        btn.innerText = "Görsel Optimize Ediliyor...";

        try {
            // Görseli burada küçültüyoruz
            const resizedBase64 = await resizeImage(file);
            const base64Data = resizedBase64.split(',')[1];
            
            btn.innerText = "Gümrük İncelemesi Yapılıyor...";

            const payload = {
                "contents": [{
                    "parts": [
                        { "text": `Sen uzman bir gümrük müşavirisin. Bu fotoğrafı analiz et. Ürün ${ulke} menşeli. GTİP kodu tahmini yap ve vergi bilgilerini ver.` },
                        {
                            "inline_data": {
                                "mime_type": "image/jpeg",
                                "data": base64Data
                            }
                        }
                    ]
                }]
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (data.error) {
                raporDiv.innerHTML = `<span style="color:red">Hata: ${data.error.message}</span>`;
            } else {
                const resultText = data.candidates[0].content.parts[0].text;
                raporDiv.innerHTML = resultText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            }
            raporDiv.style.display = 'block';

        } catch (e) {
            alert("Boyut küçültme veya bağlantı hatası!");
        } finally {
            btn.disabled = false;
            btn.innerText = "ANALİZİ BAŞLAT";
        }
    }
</script>
