<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI Pro | SaaS Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0b1120; }
        body { background: var(--dark); color: #f1f5f9; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; padding-top: 50px; }
        .glass-card { background: #1e293b; border-radius: 24px; padding: 40px; border: 1px solid #334155; width: 100%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .auth-card { max-width: 450px; margin: auto; }
        .app-card { max-width: 900px; margin: auto; }
        .input-box { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-premium { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 800; border-radius: 12px; padding: 15px; width: 100%; transition: 0.3s; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2); }
        #sonuc { background: #0f172a; border-radius: 16px; padding: 25px; margin-top: 25px; border-left: 5px solid var(--primary); display: none; }
        .history-item { background: #161e2e; border: 1px solid #334155; border-radius: 10px; padding: 15px; margin-bottom: 10px; transition: 0.2s; }
        .history-item:hover { border-color: var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection" class="glass-card auth-card">
        <div class="text-center mb-4">
            <i class="fa-solid fa-ship fa-3x text-info mb-3"></i>
            <h2 class="fw-bold">CustomsAI <span class="text-info">Pro</span></h2>
            <p class="text-muted small">Mevzuat analizine başlamak için giriş yapın.</p>
        </div>
        <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
        <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
        <button onclick="handleLogin()" id="loginBtn" class="btn btn-premium mb-3">GİRİŞ YAP</button>
        <button onclick="handleSignUp()" class="btn btn-outline-light w-100 btn-sm border-secondary text-muted">Kayıt Ol</button>
    </div>

    <div id="appSection" class="glass-card app-card hidden">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
            <h4 class="m-0 text-info fw-bold"><i class="fa-solid fa-gauge-high me-2"></i>Müşavir Paneli</h4>
            <div class="text-end">
                <small id="userMail" class="d-block text-muted mb-1"></small>
                <button onclick="handleLogout()" class="btn btn-danger btn-sm">Çıkış</button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6"><div class="input-box"><small class="text-muted d-block">ÜRÜN</small><input type="text" id="urun" placeholder="Örn: Drone"></div></div>
            <div class="col-md-6"><div class="input-box"><small class="text-muted d-block">MENŞE ÜLKE</small><input type="text" id="ulke" placeholder="Örn: Çin"></div></div>
        </div>
        <button onclick="analizVeKaydet()" id="analizBtn" class="btn btn-premium">YAPAY ZEKA ANALİZİNİ BAŞLAT</button>

        <div id="sonuc">
            <h5 class="text-info mb-3"><i class="fa-solid fa-file-invoice me-2"></i> Analiz Raporu</h5>
            <div id="raporIcerik"></div>
        </div>

        <div id="gecmisBox" class="mt-5">
            <h5 class="text-muted mb-3 border-bottom pb-2">Geçmiş Analizlerim</h5>
            <div id="gecmisListesi" class="row"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // GİRİŞ / KAYIT
    async function handleSignUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await _supabase.auth.signUp({ email, password });
        if (error) alert("Hata: " + error.message);
        else alert("Kayıt başarılı! Giriş yapabilirsin.");
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        btn.innerText = "Bağlanıyor...";
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) { alert("Hata: " + error.message); btn.innerText = "GİRİŞ YAP"; }
        else { checkUser(); }
    }

    async function handleLogout() {
        await _supabase.auth.signOut();
        location.reload();
    }

    // OTURUM KONTROLÜ
    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('userMail').innerText = user.email;
            gecmisiYukle();
        }
    }

    // ANALİZ VE KAYIT
    async function analizVeKaydet() {
        const geminiKey = "AIzaSyBuRZRF-9-5XpZlBnd_p8I1g2sF__BNBIg";
        const urun = document.getElementById('urun').value;
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('analizBtn');
        if(!urun || !ulke) return alert("Alanları doldur bro!");

        btn.disabled = true; btn.innerText = "Gemini Analiz Ediyor...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Gümrük müşaviri olarak ${ulke} menşeli ${urun} için detaylı GTİP ve vergi analizi yap.` }] }] })
            });
            const data = await res.json();
            const rapor = data.candidates[0].content.parts[0].text;

            // Veritabanına Kaydet
            const { data: { user } } = await _supabase.auth.getUser();
            await _supabase.from('arama_gecmisi').insert([{ user_id: user.id, urun, ulke, rapor }]);

            document.getElementById('raporIcerik').innerHTML = rapor.replace(/\*\*(.*?)\*\*/g, '<b class="text-info">$1</b>').replace(/\n/g, "<br>");
            document.getElementById('sonuc').style.display = 'block';
            gecmisiYukle(); // Listeyi güncelle
        } catch (e) { alert("Hata: " + e.message); }
        finally { btn.disabled = false; btn.innerText = "ANALİZİ BAŞLAT"; }
    }

    // GEÇMİŞİ ÇEK
    async function gecmisiYukle() {
        const { data: { user } } = await _supabase.auth.getUser();
        const { data } = await _supabase.from('arama_gecmisi').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
        
        if (data) {
            let html = '';
            data.forEach(item => {
                html += `
                <div class="col-md-4">
                    <div class="history-item">
                        <small class="text-muted">${new Date(item.created_at).toLocaleDateString()}</small>
                        <h6 class="text-info mb-1">${item.urun}</h6>
                        <p class="small m-0">${item.ulke}</p>
                    </div>
                </div>`;
            });
            document.getElementById('gecmisListesi').innerHTML = html || '<p class="text-muted">Henüz analiz bulunmuyor.</p>';
        }
    }

    window.onload = checkUser;
</script>
</body>
</html>
