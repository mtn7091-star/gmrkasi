<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gümrük Müşaviri AI | Profesyonel Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none; }
        .rapor-alanı { white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <header class="bg-blue-900 text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">🚢 GÜMRÜK AI ANALİZ</h1>
            <nav id="authNav" class="space-x-4">
                </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-10">
        
        <section class="bg-white rounded-xl shadow-md p-6 mb-10">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2 text-blue-800">Hızlı Gümrük Sorgusu</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="freeUrun" placeholder="Ürün Adı (Örn: Drone)" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="freeUlke" placeholder="Menşei Ülke (Örn: Çin)" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button onclick="freeAnaliz()" id="freeBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">ANINDA SORGULA</button>
            
            <div id="freeSonuc" class="hidden mt-6 p-4 bg-blue-50 border-l-4 border-blue-600 rounded">
                <p id="freeRapor" class="rapor-alanı text-gray-700"></p>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2 text-green-800">Kapsamlı Gümrük Analiz Raporu</h2>
            <p class="text-sm text-gray-500 mb-4">* Vergiler, GTİP ve detaylı prosedürler dahil profesyonel rapor üretir.</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="urun" placeholder="Ürün Detayları" class="p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                <input type="text" id="ulke" placeholder="Hedef / Menşei Ülke" class="p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <button onclick="analizVeKaydet()" id="analizBtn" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-300 uppercase tracking-wider">Tam Analiz Raporu Oluştur</button>
            
            <div id="sonuc" class="hidden mt-6 p-6 bg-green-50 border border-green-200 rounded-lg">
                <h3 class="font-bold text-green-900 mb-2 underline">PROFESYONEL ANALİZ SONUCU:</h3>
                <div id="raporIcerik" class="rapor-alanı text-gray-800"></div>
            </div>
        </section>

    </main>

    <footer class="text-center p-10 text-gray-500 text-sm">
        © 2026 Gümrük Müşaviri AI - Tüm Hakları Saklıdır.
    </footer>

    <script>
    // 1. AYARLAR
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    let _supabase;
    let groqKey = "";

    // 2. SİSTEMİ BAŞLAT VE ANAHTARI ÇEK
    async function initApp() {
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            const { data, error } = await _supabase
                .from('site_ayarlari')
                .select('anahtar_degeri')
                .eq('anahtar_adi', 'groq_api_key')
                .maybeSingle();

            if (data) {
                groqKey = data.anahtar_degeri;
                console.log("Sistem Hazır ✅");
            } else {
                console.error("Anahtar veritabanında bulunamadı!");
            }
        } catch (err) {
            console.error("Başlatma hatası:", err);
        }
    }

    document.addEventListener('DOMContentLoaded', initApp);

    // 3. HIZLI ANALİZ (GROQ LLAMA 3.3)
    async function freeAnaliz() {
        const urun = document.getElementById('freeUrun').value;
        const ulke = document.getElementById('freeUlke').value;
        const btn = document.getElementById('freeBtn');
        const raporAlan = document.getElementById('freeRapor');

        if (!groqKey) await initApp();
        if (!urun || !ulke) return alert("Eksik bilgi!");

        btn.innerText = "SORGULANIYOR...";
        btn.disabled = true;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Sen bir gümrük müşavirisin. Sadece Türkçe konuş, asla Çince veya yabancı karakter kullanma." },
                        { role: "user", content: `${ulke} menşeli ${urun} için hızlı gümrük analizi yap.` }
                    ],
                    temperature: 0.4
                })
            });

            const data = await response.json();
            raporAlan.innerText = data.choices[0].message.content;
            document.getElementById('freeSonuc').classList.remove('hidden');
        } catch (e) { alert("Bağlantı hatası!"); }
        finally { btn.innerText = "ANINDA SORGULA"; btn.disabled = false; }
    }

    // 4. TAM DETAYLI ANALİZ (GROQ LLAMA 3.3)
    async function analizVeKaydet() {
        const urun = document.getElementById('urun').value;
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('analizBtn');
        const raporAlan = document.getElementById('raporIcerik');

        if (!groqKey) await initApp();
        if (!urun || !ulke) return alert("Lütfen alanları doldurun.");

        btn.innerText = "PROFESYONEL RAPOR HAZIRLANIYOR...";
        btn.disabled = true;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Profesyonel bir gümrük müşaviri olarak; vergiler, belgeler ve prosedürleri içeren Gemini kalitesinde uzun ve detaylı bir Türkçe rapor yaz." },
                        { role: "user", content: `${ulke} menşeli ${urun} için kapsamlı analiz raporu hazırlamanı istiyorum.` }
                    ],
                    temperature: 0.6,
                    max_tokens: 2500 // Uzun rapor için
                })
            });

            const data = await response.json();
            const rapor = data.choices[0].message.content;
            raporAlan.innerText = rapor;
            document.getElementById('sonuc').classList.remove('hidden');

            // Kaydetme (Opsiyonel Supabase Kaydı)
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                await _supabase.from('arama_gecmisi').insert([{ user_id: user.id, urun, ulke, rapor }]);
            }
        } catch (e) { alert("Rapor hatası!"); }
        finally { btn.innerText = "TAM ANALİZ RAPORU OLUŞTUR"; btn.disabled = false; }
    }
    </script>
</body>
</html>
