<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gümrük AI Pro | Akıllı Analiz ve Hesaplama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700">🚢 GÜMRÜK AI PRO</h1>
            <div id="krediBox" class="text-sm font-bold bg-blue-50 px-3 py-1 rounded-full text-blue-600">Kredi: 5/5</div>
        </div>
    </nav>

    <main class="container mx-auto max-w-6xl p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="font-bold mb-4">🔍 Analiz Formu</h2>
                <input type="text" id="urun" placeholder="Ürün" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="ulke" placeholder="Ülke" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="fullAnaliz()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition-all">ANALİZ ET</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 bg-blue-50/30">
                <h2 class="font-bold mb-4 text-blue-800">🧮 Vergi Hesapla</h2>
                <div class="space-y-3">
                    <input type="number" id="malBedeli" placeholder="Mal Bedeli ($)" class="w-full p-2 border rounded-lg">
                    <input type="number" id="gVergiOran" placeholder="G. Vergisi (%)" class="w-full p-2 border rounded-lg">
                    <input type="number" id="kdvOran" placeholder="KDV (%)" class="w-full p-2 border rounded-lg">
                    <button onclick="hesapla()" class="w-full bg-blue-600 text-white py-2 rounded-lg">HESAPLA</button>
                    <div id="hesapSonuc" class="hidden text-sm font-bold text-blue-700 mt-2"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div id="sonucAlani" class="hidden bg-white p-8 rounded-2xl shadow-sm border">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="raporBaslik" class="text-2xl font-bold"></h2>
                    <button onclick="pdfIndir()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold">PDF İNDİR</button>
                </div>
                <div id="raporTarih" class="text-xs text-gray-400 mb-4"></div>
                <div id="raporIcerik" class="prose max-w-none text-slate-700"></div>
            </div>
        </div>
    </main>

    <script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    let _supabase, groqKey = "";
    let kredi = localStorage.getItem('gumrukKredi') || 5;

    async function init() {
        _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data } = await _supabase.from('site_ayarlari').select('anahtar_degeri').eq('anahtar_adi', 'groq_api_key').maybeSingle();
        if (data) groqKey = data.anahtar_degeri;
        document.getElementById('krediBox').innerText = `Kredi: ${kredi}/5`;
    }

    async function fullAnaliz() {
        const urun = document.getElementById('urun').value;
        const ulke = document.getElementById('ulke').value;
        if (!groqKey || kredi <= 0) return alert("Hata!");
        
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{ role: "system", content: "Türk gümrük müşavirisin. Detaylı Türkçe rapor yaz." }, { role: "user", content: `${ulke} - ${urun} analizi.` }],
                temperature: 0.5
            })
        });
        const data = await res.json();
        document.getElementById('raporIcerik').innerText = data.choices[0].message.content;
        document.getElementById('raporBaslik').innerText = urun + " Raporu";
        document.getElementById('raporTarih').innerText = new Date().toLocaleString();
        document.getElementById('sonucAlani').classList.remove('hidden');
        kredi--;
        localStorage.setItem('gumrukKredi', kredi);
    }

    // PDF DÜZELTMESİ BURADA
    function pdfIndir() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const icerik = document.getElementById('raporIcerik').innerText;
        
        // Türkçe karakter temizleme
        const temizText = icerik.replace(/ı/g, "i").replace(/ğ/g, "g").replace(/ü/g, "u").replace(/ş/g, "s").replace(/ö/g, "o").replace(/ç/g, "c").replace(/İ/g, "I");
        
        doc.setFont("helvetica", "bold");
        doc.text("GUMRUK RAPORU", 10, 10);
        doc.setFont("helvetica", "normal");
        
        // Satırları otomatik bölme
        const lines = doc.splitTextToSize(temizText, 180);
        doc.text(lines, 10, 20);
        doc.save("rapor.pdf");
    }

    init();
    </script>
</body>
</html>
