<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gümrük Müşaviri AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; }
        .hidden { display: none; }
        .card { background-color: #1e293b; border: none; color: white; margin-bottom: 20px; }
        .btn-primary { background-color: #3b82f6; border: none; }
        .text-info-bright { color: #60a5fa; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4">Gümrük Analiz Sistemi</h2>

    <div class="card p-4">
        <h4>Hızlı Gümrük Sorgulama (Üyeliksiz)</h4>
        <div class="row g-3">
            <div class="col-md-5"><input type="text" id="freeUrun" class="form-control" placeholder="Ürün adı (Örn: Güneş Paneli)"></div>
            <div class="col-md-5"><input type="text" id="freeUlke" class="form-control" placeholder="Menşei Ülke"></div>
            <div class="col-md-2"><button id="freeBtn" onclick="freeAnaliz()" class="btn btn-warning w-100">ANINDA SORGULA</button></div>
        </div>
        <div id="freeSonuc" class="mt-3 p-3 bg-dark rounded hidden">
            <div id="freeRapor"></div>
        </div>
    </div>

    <div id="authSection" class="card p-4">
        <h4>Sisteme Giriş Yap</h4>
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="password" class="form-control mb-2" placeholder="Şifre">
        <button onclick="handleLogin()" class="btn btn-primary">Giriş Yap</button>
    </div>

    <div id="appSection" class="hidden">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span id="userMail" class="badge bg-info"></span>
                <button onclick="handleLogout()" class="btn btn-danger btn-sm">Çıkış Yap</button>
            </div>
            <h4>Detaylı Gümrük Analizi</h4>
            <input type="text" id="urun" class="form-control mb-2" placeholder="Ürün adı">
            <input type="text" id="ulke" class="form-control mb-2" placeholder="Ülke">
            <button id="analizBtn" onclick="analizVeKaydet()" class="btn btn-success w-100">TAM ANALİZ RAPORU OLUŞTUR</button>
        </div>

        <div id="sonuc" class="card p-4 hidden">
            <h4>Analiz Sonucu</h4>
            <div id="raporIcerik"></div>
        </div>

        <h4 class="mt-4">Geçmiş Aramalarım</h4>
        <div id="gecmisListesi" class="row"></div>
    </div>
</div>

<script>
// --- AYARLAR ---
const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let geminiKey = "";

// 1. ANAHTARI KASADAN ÇEKME
async function keyiVeritabanindanGetir() {
    const { data } = await _supabase.from('site_ayarlari').select('anahtar_degeri').eq('anahtar_adi', 'gemini_api_key').single();
    if (data) geminiKey = data.anahtar_degeri;
}

// 2. SAYFA YÜKLENİNCE
window.onload = async () => {
    await keyiVeritabanindanGetir();
    checkUser();
};

// 3. ANINDA SORGULA (ÜYELİKSİZ)
async function freeAnaliz() {
    const urun = document.getElementById('freeUrun').value;
    const ulke = document.getElementById('freeUlke').value;
    const btn = document.getElementById('freeBtn');
    if(!geminiKey) await keyiVeritabanindanGetir();
    if(!urun || !ulke) return alert("Eksik bilgi!");

    btn.innerText = "LÜTFEN BEKLEYİN..."; btn.disabled = true;
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: `${ulke} menşeli ${urun} ürünü için gümrük bilgisi ver.` }] }] })
        });
        const data = await res.json();
        const rapor = data.candidates[0].content.parts[0].text;
        document.getElementById('freeRapor').innerHTML = rapor.replace(/\n/g, "<br>");
        document.getElementById('freeSonuc').classList.remove('hidden');
    } catch (e) { alert("Hata: " + e.message); }
    finally { btn.innerText = "ANINDA SORGULA"; btn.disabled = false; }
}

// 4. DETAYLI ANALİZ (GİRİŞLİ)
async function analizVeKaydet() {
    const urun = document.getElementById('urun').value;
    const ulke = document.getElementById('ulke').value;
    if(!geminiKey) await keyiVeritabanindanGetir();

    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: `${ulke} menşeli ${urun} için detaylı gümrük raporu hazırla.` }] }] })
    });
    const data = await res.json();
    const rapor = data.candidates[0].content.parts[0].text;
    const { data: { user } } = await _supabase.auth.getUser();
    await _supabase.from('arama_gecmisi').insert([{ user_id: user.id, urun, ulke, rapor }]);
    document.getElementById('raporIcerik').innerHTML = rapor.replace(/\n/g, "<br>");
    document.getElementById('sonuc').style.display = 'block';
    gecmisiYukle();
}

// 5. YARDIMCI FONKSİYONLAR
async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    await _supabase.auth.signInWithPassword({ email, password });
    checkUser();
}
async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }
async function checkUser() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('userMail').innerText = user.email;
        gecmisiYukle();
    }
}
async function gecmisiYukle() {
    const { data: { user } } = await _supabase.auth.getUser();
    const { data } = await _supabase.from('arama_gecmisi').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
    if (data) {
        let html = '';
        data.forEach(item => { html += `<div class="col-md-4"><div class="card p-2"><h6>${item.urun}</h6><p>${item.ulke}</p></div></div>`; });
        document.getElementById('gecmisListesi').innerHTML = html;
    }
}
</script>
</body>
</html>
