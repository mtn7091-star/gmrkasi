<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI Pro | 2.5 Flash Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --dark: #0b1120; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding-top: 50px; }
        .glass-card { background: rgba(30, 41, 59, 0.95); border-radius: 20px; padding: 30px; border: 1px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .input-box { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #475569; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1.1rem; }
        .btn-flash { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 900; width: 100%; padding: 18px; border-radius: 15px; text-transform: uppercase; letter-spacing: 1px; }
        #sonuc { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 25px; margin-top: 25px; display: none; border-left: 6px solid var(--primary); }
    </style>
</head>
<body>

<div class="container" style="max-width: 650px;">
    <div id="authSection" class="glass-card text-center">
        <h2 class="fw-bold mb-4">CustomsAI <span style="color:var(--primary)">2.5 Flash</span></h2>
        <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
        <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
        <button onclick="handleLogin()" class="btn-flash">SİSTEME GİRİŞ YAP</button>
    </div>

    <div id="appSection" class="glass-card d-none">
        <div class="d-flex justify-content-between mb-4 border-bottom pb-2 border-secondary">
            <h4 class="fw-bold">Gümrük Robotu (2.5 Flash Engine)</h4>
            <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm">Çıkış</button>
        </div>
        
        <div class="input-box">
            <small class="text-info d-block fw-bold mb-1">ÜRÜN TANIMI</small>
            <input type="text" id="urun" placeholder="Örn: Güneş Paneli">
        </div>

        <div class="input-box">
            <small class="text-info d-block fw-bold mb-1">MENŞE ÜLKE</small>
            <input type="text" id="ulke" placeholder="Örn: Çin">
        </div>

        <button onclick="analizEt()" id="btn" class="btn-flash">2.5 FLASH İLE ANALİZ ET</button>

        <div id="sonuc">
            <h5 style="color:var(--primary)" class="mb-3">📄 Gümrük Müşaviri Analiz Raporu</h5>
            <div id="rapor" class="lh-lg" style="font-size: 0.95rem;"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Senin taze anahtarın
    const geminiKey = "AIzaSyB3bMCCNqh6asNhtHbXi-tvBt9s18DEIE4"; 

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) {
            await _supabase.auth.signUp({ email, password });
            alert("Giriş sağlandı.");
        }
        checkUser();
    }

    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').classList.add('d-none');
            document.getElementById('appSection').classList.remove('d-none');
        }
    }

    async function analizEt() {
        const urun = document.getElementById('urun').value;
        const ulke = document.getElementById('ulke').value;
        const btn = document.getElementById('btn');
        if(!urun || !ulke) return alert("Bilgileri gir dayı!");

        btn.disabled = true; btn.innerText = "2.5 FLASH ANALİZ EDİYOR...";

        try {
            const prompt = `Profesyonel gümrük müşaviri olarak analiz et: Ürün: ${urun}, Menşe Ülke: ${ulke}. Tahmini GTİP, Gümrük Vergisi, KDV, İGV oranlarını ve Tareks/TSE gibi belgeleri detaylı bir rapor olarak sun.`;
            
            // DAYI BURADA: gemini-2.5-flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`;

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('rapor').innerHTML = text
                .replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--primary)">$1</b>')
                .replace(/\n/g, "<br>");
            document.getElementById('sonuc').style.display = 'block';

        } catch (e) {
            alert("Dayı: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = "2.5 FLASH İLE ANALİZ ET";
        }
    }

    window.onload = checkUser;
</script>
</body>
</html>
