<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gümrük AI Pro | Kesintisiz Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b p-4 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700">🚢 GÜMRÜK AI PRO</h1>
            <div id="krediBox" class="text-sm font-bold bg-blue-50 px-3 py-1 rounded-full text-blue-600 font-mono">Kredi: 5/5</div>
        </div>
    </nav>

    <main class="container mx-auto max-w-6xl p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="font-bold mb-4 italic text-slate-500">Analiz Verileri</h2>
                <input type="text" id="urunInput" placeholder="Ürün (Örn: Gitar)" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="ulkeInput" placeholder="Ülke (Örn: Çin)" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="fullAnaliz()" id="anaButon" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-blue-600 transition-all shadow-lg">ANALİZ ET</button>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div id="loading" class="hidden text-center py-20 bg-white rounded-2xl border-2 border-dashed border-slate-200">
                <p class="animate-pulse text-blue-600 font-bold">Yapay Zeka Raporu Hazırlıyor...</p>
            </div>

            <div id="sonucAlani" class="hidden bg-white p-8 rounded-2xl shadow-md border border-slate-100">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h2 id="raporBaslik" class="text-2xl font-bold text-slate-800"></h2>
                    <button onclick="pdfIndir()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg font-bold shadow-sm transition-colors">PDF İNDİR</button>
                </div>
                <div id="raporIcerik" class="text-slate-700 leading-relaxed whitespace-pre-line"></div>
            </div>
        </div>
    </main>

    <script>
    // 1. AYARLAR
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    let _supabase, groqKey = "";
    let kredi = localStorage.getItem('gumrukKredi') || 5;

    // 2. SİSTEMİ BAŞLAT
    async function init() {
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data } = await _supabase.from('site_ayarlari').select('anahtar_degeri').eq('anahtar_adi', 'groq_api_key').maybeSingle();
            if (data) {
                groqKey = data.anahtar_degeri;
                console.log("Bağlantı Başarılı ✅");
            }
        } catch (e) { console.error("Başlatma hatası:", e); }
        document.getElementById('krediBox').innerText = `Kredi: ${kredi}/5`;
    }

    // 3. ANA ANALİZ FONKSİYONU
    async function fullAnaliz() {
        const urun = document.getElementById('urunInput').value;
        const ulke = document.getElementById('ulkeInput').value;
        const btn = document.getElementById('anaButon');

        if (!urun || !ulke) return alert("Lütfen ürün ve ülke girin.");
        if (!groqKey) return alert("Sistem henüz hazır değil, lütfen 2 saniye bekleyip tekrar basın.");
        if (kredi <= 0) return alert("Bugünlük limitin doldu başkan.");

        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('sonucAlani').classList.add('hidden');
        btn.disabled = true;
        btn.innerText = "İŞLENİYOR...";

        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Sen kıdemli bir Türk gümrük müşavirisin. Detaylı, profesyonel ve tamamen Türkçe bir ithalat raporu yaz." },
                        { role: "user", content: `${ulke} menşeli ${urun} için gümrük vergileri ve prosedürleri anlat.` }
                    ],
                    temperature: 0.5
                })
            });
            const data = await res.json();
            const rapor = data.choices[0].message.content;

            document.getElementById('raporIcerik').innerText = rapor;
            document.getElementById('raporBaslik').innerText = urun.toUpperCase() + " ANALİZİ";
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('sonucAlani').classList.remove('hidden');

            kredi--;
            localStorage.setItem('gumrukKredi', kredi);
            document.getElementById('krediBox').innerText = `Kredi: ${kredi}/5`;

        } catch (e) { 
            alert("Groq bağlantı hatası!"); 
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.innerText = "ANALİZ ET";
        }
    }

    // 4. ÇOK SAYFALI PDF FONKSİYONU
    function pdfIndir() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const icerik = document.getElementById('raporIcerik').innerText;
        const baslik = document.getElementById('raporBaslik').innerText;
        
        const temizText = icerik
            .replace(/ı/g, "i").replace(/ğ/g, "g").replace(/ü/g, "u")
            .replace(/ş/g, "s").replace(/ö/g, "o").replace(/ç/g, "c")
            .replace(/İ/g, "I").replace(/Ş/g, "S").replace(/Ğ/g, "G")
            .replace(/Ü/g, "U").replace(/Ö/g, "O").replace(/Ç/g, "C");

        doc.setFont("helvetica", "bold");
        doc.text("GUMRUK ANALIZ RAPORU", 10, 15);
        doc.line(10, 18, 200, 18);
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        
        const lines = doc.splitTextToSize(temizText, 180);
        let y = 25;

        lines.forEach(line => {
            if (y > 280) { doc.addPage(); y = 20; }
            doc.text(line, 10, y);
            y += 7;
        });

        doc.save(baslik + ".pdf");
    }

    init();
    </script>
</body>
</html>
