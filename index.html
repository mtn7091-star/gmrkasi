<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --accent: #4facfe; --dark: #0b1120; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 40px 0; }
        .glass-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; backdrop-filter: blur(15px); padding: 35px; height: 100%; }
        .header-title { font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .header-title span { color: var(--primary); }
        .input-box { background: rgba(15, 23, 42, 0.7); border: 1px solid #334155; border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .btn-guest { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-guest:hover { background: var(--primary); color: var(--dark); }
        .btn-pro { background: linear-gradient(90deg, var(--primary), var(--accent)); color: var(--dark); }
        #reportArea { display: none; margin-top: 30px; background: rgba(0, 242, 254, 0.03); border: 1px solid rgba(0, 242, 254, 0.1); border-radius: 15px; padding: 25px; }
        .badge-custom { font-size: 0.7rem; background: rgba(0, 242, 254, 0.1); color: var(--primary); padding: 5px 12px; border-radius: 50px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 950px;">
    <div class="text-center mb-5">
        <h1 class="header-title">CustomsAI <span>Pro</span></h1>
        <p class="text-secondary small">Türkiye'nin En Gelişmiş Yapay Zeka Gümrük Asistanı</p>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="glass-card">
                <div class="d-flex justify-content-between mb-4">
                    <h5 class="m-0">⚡ Hızlı Deneme</h5>
                    <span class="badge-custom">Standart</span>
                </div>
                <div class="input-box"><input type="text" id="hizliUrun" placeholder="Ürün Tanımı"></div>
                <div class="input-box"><input type="text" id="hizliUlke" placeholder="Menşe Ülke"></div>
                <button onclick="sorgula(true)" id="hizliBtn" class="btn-action btn-guest">ANINDA SORGULA</button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="glass-card">
                <div class="d-flex justify-content-between mb-4">
                    <h5 class="m-0">👤 Müşavir Girişi</h5>
                    <span class="badge-custom" style="color: #4facfe;">Pro Mod</span>
                </div>
                <div id="loginForm">
                    <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
                    <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
                    <button onclick="handleLogin()" class="btn-action btn-pro">GİRİŞ YAP</button>
                </div>
                <div id="proPanel" class="d-none text-center py-4">
                    <p class="text-info small mb-3">2.5 Flash Engine Aktif</p>
                    <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm">Oturumu Kapat</button>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div id="reportArea">
                <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">📄 GÜMRÜK ANALİZ RAPORU</h6>
                <div id="raporMetni" class="small text-light" style="line-height: 1.8;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const geminiKey = "AIzaSyB3bMCCNqh6asNhtHbXi-tvBt9s18DEIE4";
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) { await _supabase.auth.signUp({ email, password }); }
        location.reload();
    }

    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('loginForm').classList.add('d-none');
            document.getElementById('proPanel').classList.remove('d-none');
        }
    }

    async function sorgula(isGuest) {
        const urun = document.getElementById('hizliUrun').value;
        const ulke = document.getElementById('hizliUlke').value;
        const btn = document.getElementById('hizliBtn');

        if(!urun || !ulke) return alert("Bilgileri doldur başkan!");

        // Hızlı sorgu limit koruması
        const last = localStorage.getItem('last_call');
        if (isGuest && last && (Date.now() - last < 15000)) return alert("Limitleri zorlamayalım, 15 saniye bekleyin.");

        btn.disabled = true; btn.innerText = "SORGULANIYOR...";

        try {
            // Hızlı denemede 1.5, Pro'da 2.5 Flash (2.0-flash)
            const model = isGuest ? "gemini-1.5-flash" : "gemini-2.0-flash";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey}`;
            
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Gümrük müşaviri raporu: ${urun}, Menşe: ${ulke}. GTİP ve vergi oranlarını detaylandır.` }] }] })
            });

            const data = await res.json();
            if (data.error) throw new Error("Limit doldu, biraz bekleyin veya Pro giriş yapın.");

            if (isGuest) localStorage.setItem('last_call', Date.now());

            document.getElementById('raporMetni').innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            document.getElementById('reportArea').style.display = 'block';

        } catch (e) {
            alert(e.message);
        } finally {
            btn.disabled = false; btn.innerText = "ANINDA SORGULA";
        }
    }

    window.onload = checkUser;
</script>
</body>
</html>
