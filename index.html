<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gümrük AI Pro | Analiz ve Vergi Hesaplama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b p-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700">🚢 GÜMRÜK AI PRO</h1>
            <div id="krediBox" class="text-sm font-bold bg-blue-50 px-3 py-1 rounded-full text-blue-600 font-mono">Kredi: 5/5</div>
        </div>
    </nav>

    <main class="container mx-auto max-w-6xl p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="font-bold mb-4 flex items-center gap-2 text-slate-700">🔍 Mevzuat Analizi</h2>
                <input type="text" id="urunInput" placeholder="Ürün (Örn: Güneş Paneli)" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="ulkeInput" placeholder="Ülke (Örn: Çin)" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="fullAnaliz()" id="anaButon" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-blue-600 transition-all shadow-lg">ANALİZ ET</button>
            </div>

            <div class="bg-blue-50/50 p-6 rounded-2xl shadow-sm border border-blue-100">
                <h2 class="font-bold mb-4 text-blue-800 flex items-center gap-2 text-sm uppercase tracking-wider">🧮 Maliyet Hesaplama</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500">MAL BEDELİ ($)</label>
                        <input type="number" id="malBedeli" value="1000" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500">GÜMRÜK VERGİSİ (%)</label>
                            <input type="number" id="gVergiOran" value="10" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500">KDV (%)</label>
                            <input type="number" id="kdvOran" value="20" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                    </div>
                    <button onclick="hesapla()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 shadow-md transition-all uppercase text-xs">Hesapla</button>
                    
                    <div id="hesapSonuc" class="hidden mt-4 p-4 bg-white border rounded-xl space-y-3 shadow-inner">
                        <div class="flex justify-between text-xs text-slate-600"><span>Gümrük Vergisi:</span><span id="resGV" class="font-bold text-slate-800"></span></div>
                        <div class="flex justify-between text-xs text-slate-600"><span>KDV Tutarı:</span><span id="resKDV" class="font-bold text-slate-800"></span></div>
                        <div class="border-t pt-2 flex justify-between text-sm text-blue-700 font-extrabold uppercase italic"><span>TOPLAM:</span><span id="resTotal"></span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div id="loading" class="hidden text-center py-24 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                <p class="text-blue-600 font-bold uppercase text-xs tracking-widest">Mevzuat Verileri İşleniyor...</p>
            </div>

            <div id="sonucAlani" class="hidden bg-white p-8 rounded-3xl shadow-xl border border-slate-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-blue-600"></div>
                <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-6">
                    <div>
                        <h2 id="raporBaslik" class="text-2xl font-black text-slate-800 tracking-tight"></h2>
                        <p id="raporTarih" class="text-[10px] text-slate-400 mt-1 font-mono uppercase"></p>
                    </div>
                    <button onclick="pdfIndir()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-xl font-bold text-xs shadow-lg transition-transform hover:scale-105 active:scale-95">PDF RAPORU AL</button>
                </div>
                <div id="raporIcerik" class="text-slate-700 leading-relaxed whitespace-pre-line text-sm selection:bg-blue-100"></div>
            </div>
        </div>
    </main>

<script>
// 1. AYARLAR VE SUPABASE BAĞLANTISI
const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
let _supabase, groqKey = "", tavilyKey = "";
let kredi = localStorage.getItem('gumrukKredi') || 5;

// 2. SİSTEMİ BAŞLAT (SQL'DEN ANAHTARLARI ÇEKER)
async function init() {
    try {
        _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await _supabase.from('site_ayarlari').select('anahtar_adi, anahtar_degeri');
        
        if (data) {
            groqKey = data.find(x => x.anahtar_adi === 'groq_api_key')?.anahtar_degeri?.trim();
            tavilyKey = data.find(x => x.anahtar_adi === 'tavily_api_key')?.anahtar_degeri?.trim();
            console.log("Sistem Hazır: Anahtarlar yüklendi ✅");
        }
        if (error) console.error("Anahtar çekme hatası:", error);
    } catch (e) {
        console.error("Başlatma hatası:", e);
    }
    document.getElementById('krediBox').innerText = `Kredi: ${kredi}/5`;
}

// 3. ANA ANALİZ FONKSİYONU (İNTERNETTE ARA + AI İLE YORUMLA)
async function fullAnaliz() {
    const urun = document.getElementById('urunInput').value;
    const ulke = document.getElementById('ulkeInput').value;
    const btn = document.getElementById('anaButon');

    if (!urun || !ulke) return alert("Lütfen ürün ve ülke girin.");
    if (!groqKey || !tavilyKey) return alert("Sistem henüz hazır değil, lütfen 2 saniye sonra tekrar deneyin.");
    if (kredi <= 0) return alert("Günlük limitin doldu başkan.");

    // Arayüzü Yükleniyor Moduna Sok
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('sonucAlani').classList.add('hidden');
    btn.disabled = true;
    btn.innerText = "GÜNCEL MEVZUAT TARANIYOR...";

    try {
        // --- ADIM 1: TAVILY İLE İNTERNETİ TARA ---
        const searchRes = await fetch('https://api.tavily.com/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                api_key: tavilyKey,
                query: `${ulke} menseli ${urun} ithalat gumruk vergisi oranlari ve mevzuati 2025 resmi gazete`,
                search_depth: "advanced",
                max_results: 5
            })
        });
        const searchData = await searchRes.json();
        const internetBilgisi = searchData.results?.map(r => r.content).join("\n\n") || "Guncel veri bulunamadi.";

        btn.innerText = "GÜMRÜK RAPORU HAZIRLANIRKEN BEKLEYİN...";

        // --- ADIM 2: GROQ İLE ANALİZ ET ---
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { 
                        role: "system", 
                        content: `Sen uzman bir gümrük müşavirisin. Şu güncel internet verilerini kullanarak teknik bir rapor hazırla: ${internetBilgisi}. 
                        Mutlaka muhtemel GTİP kodunu belirt, vergi oranlarını (GV, İGV, KDV) yaz ve gerekli belgeleri listele.` 
                    },
                    { 
                        role: "user", 
                        content: `${ulke} menseli ${urun} için detaylı gümrük analiz raporu yaz.` 
                    }
                ],
                temperature: 0.2
            })
        });
        
        const data = await res.json();
        const rapor = data.choices[0].message.content;

        // Ekrana Yazdır
        document.getElementById('raporIcerik').innerText = rapor;
        document.getElementById('raporBaslik').innerText = urun.toUpperCase() + " TEKNİK ANALİZ RAPORU";
        document.getElementById('raporTarih').innerText = new Date().toLocaleString();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('sonucAlani').classList.remove('hidden');

        // Kredi Düşür
        kredi--;
        localStorage.setItem('gumrukKredi', kredi);
        document.getElementById('krediBox').innerText = `Kredi: ${kredi}/5`;

    } catch (e) {
        console.error(e);
        alert("Bağlantı hatası! API anahtarlarını ve SQL kaydını kontrol et.");
    } finally {
        btn.disabled = false;
        btn.innerText = "ANALİZ ET";
    }
}

// 4. VERGİ HESAPLAMA MOTORU
function hesapla() {
    const bedel = parseFloat(document.getElementById('malBedeli').value) || 0;
    const gvOran = (parseFloat(document.getElementById('gVergiOran').value) || 0) / 100;
    const kdvOran = (parseFloat(document.getElementById('kdvOran').value) || 0) / 100;

    const gvTutar = bedel * gvOran;
    const kdvTutar = (bedel + gvTutar) * kdvOran;
    const toplam = bedel + gvTutar + kdvTutar;

    document.getElementById('resGV').innerText = gvTutar.toFixed(2) + " $";
    document.getElementById('resKDV').innerText = kdvTutar.toFixed(2) + " $";
    document.getElementById('resTotal').innerText = toplam.toFixed(2) + " $";
    document.getElementById('hesapSonuc').classList.remove('hidden');
}

// 5. PDF İNDİRME FONKSİYONU (VİP TASARIM)
function pdfIndir() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const icerik = document.getElementById('raporIcerik').innerText;
    
    // Türkçe karakter temizleme
    const temizText = icerik.replace(/[ıĞÜŞÖÇİğüşöç]/g, function(letter) {
        const mapping = {'ı':'i','Ğ':'G','Ü':'U','Ş':'S','Ö':'O','Ç':'C','İ':'I','ğ':'g','ü':'u','ş':'s','ö':'o','ç':'c'};
        return mapping[letter];
    });

    doc.setFont("helvetica", "bold");
    doc.text("GUMRUK ANALIZ RAPORU", 10, 15);
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    
    const lines = doc.splitTextToSize(temizText, 180);
    let y = 25;
    lines.forEach(line => {
        if (y > 280) { doc.addPage(); y = 20; }
        doc.text(line, 10, y);
        y += 6;
    });
    doc.save("Gümrük_Teknik_Raporu.pdf");
}

// Sayfa açıldığında anahtarları yükle
init();
</script>
</body>
</html>
