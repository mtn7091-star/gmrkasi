<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI Pro | Görsel Analiz Destekli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --dark: #0b1120; --text-bright: #f8fafc; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: var(--text-bright); font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; padding-top: 50px; transition: 0.3s; }
        .glass-card { backdrop-filter: blur(15px); background: rgba(30, 41, 59, 0.8); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); transition: 0.3s; }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #475569; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        body.light-mode { background: radial-gradient(circle at top right, #f8fafc, #e2e8f0); color: #1e293b; }
        body.light-mode .glass-card { background: rgba(255, 255, 255, 0.9); color: #1e293b; border: 1px solid rgba(0,0,0,0.1); }
        body.light-mode .input-box { background: #ffffff; border-color: #cbd5e1; }
        body.light-mode .input-box input { color: #1e293b; }
        .btn-premium { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 800; border-radius: 12px; padding: 15px; transition: 0.3s; text-transform: uppercase; }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4); }
        #sonuc { background: rgba(15, 23, 42, 0.9); border-radius: 16px; padding: 25px; margin-top: 25px; border-left: 5px solid var(--primary); display: none; }
        .evrak-box { background: rgba(0, 242, 254, 0.1); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px dashed var(--primary); }
        .hidden { display: none !important; }
        .preview-img { max-width: 100%; border-radius: 12px; margin-top: 10px; display: none; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <div class="text-center mb-5">
            <h1 class="fw-bold">CustomsAI <span style="color:var(--primary)">Pro</span></h1>
            <p class="opacity-75">Yapay Zeka ve Görsel Analiz ile Gümrükleme 4.0</p>
        </div>
        <div class="row g-4 justify-content-center">
            <div class="col-md-5">
                <div class="glass-card text-center h-100">
                    <h4 class="fw-bold mb-4">Müşavir Girişi</h4>
                    <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
                    <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
                    <button onclick="handleLogin()" id="loginBtn" class="btn btn-premium w-100 mb-3">GİRİŞ YAP</button>
                    <button onclick="handleSignUp()" class="btn btn-outline-secondary w-100 btn-sm">Kayıt Ol</button>
                </div>
            </div>
        </div>
    </div>

    <div id="appSection" class="glass-card hidden" style="max-width: 900px; margin: auto;">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3 border-secondary">
            <h4 class="m-0 fw-bold"><i class="fa-solid fa-eye me-2" style="color:var(--primary)"></i>Görsel Analiz Paneli</h4>
            <div class="d-flex align-items-center">
                <button onclick="toggleTheme()" class="btn btn-outline-info btn-sm me-2"><i id="themeIcon" class="fa-solid fa-sun"></i></button>
                <button onclick="handleLogout()" class="btn btn-danger btn-sm">Çıkış</button>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="input-box"><small class="text-info d-block mb-1">ÜRÜN ADI (OPSİYONEL)</small><input type="text" id="urun" placeholder="Veya foto yükleyin"></div>
            </div>
            <div class="col-md-6">
                <div class="input-box"><small class="text-info d-block mb-1">MENŞE ÜLKE</small><input type="text" id="ulke" placeholder="Örn: Almanya"></div>
            </div>
        </div>

        <div class="input-box text-center p-4" style="border: 2px dashed #475569; cursor: pointer;" onclick="document.getElementById('fotoInput').click()">
            <i class="fa-solid fa-camera fa-2x mb-2 text-info"></i>
            <p class="small m-0">Ürün Fotoğrafı veya Etiket Yükle (GTİP Tahmini İçin)</p>
            <input type="file" id="fotoInput" class="hidden" accept="image/*" onchange="previewFile()">
            <img id="preview" class="preview-img">
        </div>

        <button onclick="analizEt()" id="analizBtn" class="btn btn-premium w-100 mt-3">ANALİZİ BAŞLAT (AI GÖZÜYLE)</button>

        <div id="sonuc">
            <h5 style="color:var(--primary)" class="mb-3"><i class="fa-solid fa-robot me-2"></i> AI Uzman Raporu</h5>
            <div id="raporIcerik"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('themeIcon');
        icon.classList.toggle('fa-sun'); icon.classList.toggle('fa-moon');
    }

    function previewFile() {
        const preview = document.getElementById('preview');
        const file = document.getElementById('fotoInput').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { preview.src = reader.result; preview.style.display = 'block'; }
        if (file) reader.readAsDataURL(file);
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Hata!"); else checkUser();
    }

    async function handleSignUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await _supabase.auth.signUp({ email, password });
        alert("Kayıt ok!");
    }

    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
        }
    }

    async function analizEt() {
        const geminiKey = "AIzaSyBuRZRF-9-5XpZlBnd_p8I1g2sF__BNBIg";
        const urun = document.getElementById('urun').value;
        const ulke = document.getElementById('ulke').value;
        const file = document.getElementById('fotoInput').files[0];
        const btn = document.getElementById('analizBtn');

        btn.disabled = true; btn.innerText = "GÖRSEL İŞLENİYOR...";

        let prompt = `Gümrük müşaviri olarak ${ulke} menşeli bu ürünü analiz et. GTİP kodu, vergi oranları ve gerekli belgeleri (ATR, TSE vb.) belirt.`;
        if(urun) prompt += ` Ürün ismi: ${urun}`;

        try {
            let bodyData;
            if (file) {
                const base64Data = document.getElementById('preview').src.split(',')[1];
                bodyData = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: file.type, data: base64Data } }
                        ]
                    }]
                };
            } else {
                bodyData = { contents: [{ parts: [{ text: prompt }] }] };
            }

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify(bodyData)
            });
            const data = await res.json();
            const rapor = data.candidates[0].content.parts[0].text;

            document.getElementById('raporIcerik').innerHTML = rapor.replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--primary)">$1</b>').replace(/\n/g, "<br>");
            document.getElementById('sonuc').style.display = 'block';
        } catch (e) { alert("Hata oluştu, tekrar deneyin."); }
        finally { btn.disabled = false; btn.innerText = "ANALİZİ BAŞLAT (AI GÖZÜYLE)"; }
    }

    window.onload = checkUser;
</script>
</body>
</html>
