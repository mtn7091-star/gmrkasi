<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gümrük AI Pro | Akıllı Analiz ve Raporlama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="glass sticky top-0 z-50 border-b border-slate-200 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🚢</span>
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">GÜMRÜK AI PRO</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="krediBadge" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-semibold">Kredi: 5/5</div>
                <button onclick="location.reload()" class="text-slate-500 hover:text-blue-600 text-sm">🔄 Sıfırla</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto max-w-5xl p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🔍 Yeni Analiz</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-semibold text-slate-500 uppercase">Ürün Detayı</label>
                            <input type="text" id="urun" placeholder="Örn: Elektrikli Drone" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-slate-500 uppercase">Menşei Ülke</label>
                            <input type="text" id="ulke" placeholder="Örn: Güney Kore" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <button onclick="fullAnaliz()" id="analizBtn" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg flex justify-center items-center gap-2">
                            <span>ANALİZİ BAŞLAT</span>
                        </button>
                    </div>
                </div>

                <div id="gtipKutusu" class="hidden bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                    <h3 class="text-indigo-900 font-bold text-sm mb-2">💡 Tahmini GTİP Kodları</h3>
                    <div id="gtipListesi" class="text-xs text-indigo-700 space-y-1"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="loading" class="hidden flex flex-col items-center justify-center h-64 bg-white rounded-2xl border border-dashed border-slate-300">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                    <p class="text-slate-500 animate-pulse">Yapay zeka mevzuatı tarıyor...</p>
                </div>

                <div id="sonucAlani" class="hidden bg-white p-8 rounded-2xl shadow-xl border border-slate-100 relative">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800" id="raporBaslik">Gümrük Analiz Raporu</h2>
                            <p class="text-sm text-slate-400" id="raporTarih"></p>
                        </div>
                        <button onclick="pdfIndir()" class="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-lg flex items-center gap-2 text-sm font-bold transition-colors">
                            <span>📄 PDF İNDİR</span>
                        </button>
                    </div>
                    
                    <div id="raporIcerik" class="prose prose-slate max-w-none text-slate-700 leading-relaxed space-y-4">
                        </div>
                </div>

                <div id="bosDurum" class="flex flex-col items-center justify-center h-96 opacity-30 text-center">
                    <span class="text-6xl mb-4">🚢</span>
                    <p class="text-xl font-medium">Analiz başlatmak için formu doldurun</p>
                </div>
            </div>
        </div>
    </main>

    <script>
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    let _supabase, groqKey = "";
    let gunlukKredi = localStorage.getItem('gumrukKredi') || 5;

    // 1. BAŞLATMA
    async function initApp() {
        _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data } = await _supabase.from('site_ayarlari').select('anahtar_degeri').eq('anahtar_adi', 'groq_api_key').maybeSingle();
        if (data) groqKey = data.anahtar_degeri;
        krediGuncelle();
    }

    function krediGuncelle() {
        document.getElementById('krediBadge').innerText = `Kredi: ${gunlukKredi}/5`;
    }

    // 2. ANA ANALİZ MOTORU
    async function fullAnaliz() {
        const urun = document.getElementById('urun').value;
        const ulke = document.getElementById('ulke').value;
        
        if (gunlukKredi <= 0) return alert("Günlük limit doldu!");
        if (!urun || !ulke) return alert("Lütfen eksikleri doldurun.");

        // Arayüz Hazırlığı
        document.getElementById('bosDurum').classList.add('hidden');
        document.getElementById('sonucAlani').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('gtipKutusu').classList.add('hidden');

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${groqKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Sen profesyonel bir gümrük müşavirisin. Önce en başa 'MUHTEMEL_GTIP: [kodlar]' şeklinde bir satır ekle, sonra detaylı Türkçe rapor yaz. Asla yabancı karakter kullanma." },
                        { role: "user", content: `${ulke} menşeli ${urun} için vergiler, yasaklar ve belgeler dahil 1000 kelimelik rapor yaz.` }
                    ],
                    temperature: 0.5,
                    max_tokens: 3000
                })
            });

            const data = await response.json();
            const rawContent = data.choices[0].message.content;

            // GTİP Ayıklama
            const gtipMatch = rawContent.match(/MUHTEMEL_GTIP: (.*)/);
            if(gtipMatch) {
                document.getElementById('gtipListesi').innerText = gtipMatch[1];
                document.getElementById('gtipKutusu').classList.remove('hidden');
            }

            // Raporu Yazdır
            const temizRapor = rawContent.replace(/MUHTEMEL_GTIP: .*/, "").trim();
            document.getElementById('raporIcerik').innerHTML = temizRapor.split('\n').map(p => `<p class="mb-3">${p}</p>`).join('');
            document.getElementById('raporTarih').innerText = new Date().toLocaleString('tr-TR');
            document.getElementById('raporBaslik').innerText = `${urun} Analizi (${ulke})`;
            
            // Kredi Düş ve Kaydet
            gunlukKredi--;
            localStorage.setItem('gumrukKredi', gunlukKredi);
            krediGuncelle();

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('sonucAlani').classList.remove('hidden');

        } catch (e) { alert("Hata oluştu!"); }
    }

    // 3. PDF İNDİRME FONKSİYONU
    function pdfIndir() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const icerik = document.getElementById('raporIcerik').innerText;
        const baslik = document.getElementById('raporBaslik').innerText;

        doc.setFontSize(18);
        doc.text(baslik, 10, 20);
        doc.setFontSize(10);
        doc.text(new Date().toLocaleString(), 10, 28);
        doc.line(10, 32, 200, 32);
        
        doc.setFontSize(11);
        const splitText = doc.splitTextToSize(icerik, 180);
        doc.text(splitText, 10, 40);
        
        doc.save(`${baslik}_Raporu.pdf`);
    }

    document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
