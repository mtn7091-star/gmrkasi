<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomsAI | 2.5 Flash Power</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00f2fe; --dark: #0b1120; }
        body { background: radial-gradient(circle at top right, #1e293b, #0b1120); color: white; font-family: sans-serif; min-height: 100vh; padding-top: 30px; }
        .glass-card { background: rgba(30, 41, 59, 0.95); border-radius: 20px; padding: 25px; border: 1px solid var(--primary); margin-bottom: 20px; }
        .input-box { background: #1e293b; border-radius: 12px; padding: 10px; margin-bottom: 15px; border: 1px solid #475569; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .btn-flash { background: linear-gradient(90deg, #00f2fe, #4facfe); border: none; color: #0b1120; font-weight: 900; width: 100%; padding: 15px; border-radius: 12px; transition: 0.3s; }
        .btn-flash:disabled { opacity: 0.6; cursor: not-allowed; }
        #sonucAlan { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; margin-top: 20px; display: none; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<div class="container" style="max-width: 650px;">
    
    <div id="guestSection" class="glass-card">
        <h4 class="text-center mb-3">🚀 Hızlı Deneme (Limitli)</h4>
        <div class="input-box"><input type="text" id="hizliUrun" placeholder="Ürün Tanımı (Örn: Drone)"></div>
        <div class="input-box"><input type="text" id="hizliUlke" placeholder="Menşe Ülke (Örn: Çin)"></div>
        <button onclick="hizliSorgu(true)" id="hizliBtn" class="btn-flash">2.5 FLASH İLE HIZLI DENE</button>
        <div class="text-center mt-3 small">
            <a href="#" onclick="showLogin()" class="text-info">Zaten hesabım var / Giriş Yap</a>
        </div>
    </div>

    <div id="authSection" class="glass-card text-center d-none">
        <h3>Giriş Yap</h3>
        <div class="input-box"><input type="email" id="email" placeholder="E-posta"></div>
        <div class="input-box"><input type="password" id="password" placeholder="Şifre"></div>
        <button onclick="handleLogin()" class="btn-flash">SİSTEME GİRİŞ YAP</button>
        <button onclick="showGuest()" class="btn btn-link btn-sm text-secondary mt-2">Hızlı Denemeye Dön</button>
    </div>

    <div id="memberSection" class="glass-card d-none">
        <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
            <h4 class="fw-bold">Pro Panel (Sınırsız)</h4>
            <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm">Çıkış</button>
        </div>
        <div class="input-box"><input type="text" id="proUrun" placeholder="Detaylı Ürün Tanımı"></div>
        <div class="input-box"><input type="text" id="proUlke" placeholder="Menşe Ülke"></div>
        <button onclick="hizliSorgu(false)" id="proBtn" class="btn-flash">PROFESYONEL ANALİZ</button>
    </div>

    <div id="sonucAlan">
        <h6 style="color:var(--primary)">🤖 Gümrük Raporu:</h6>
        <div id="raporMetni" class="small lh-lg text-light"></div>
    </div>

</div>

<script>
    // Konfigürasyon
    const SUPABASE_URL = 'https://tteymnbsxnuvmgfmwjnb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0ZXltbmJzeG51dm1nZm13am5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQxMjksImV4cCI6MjA4Nzg5MDEyOX0.85bmeNzc694sXjrOFHHmBFyZseyk6hQVnVHWOZyupig';
    const geminiKey = "AIzaSyB3bMCCNqh6asNhtHbXi-tvBt9s18DEIE4"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // UI Kontrolleri
    function showLogin() { document.getElementById('guestSection').classList.add('d-none'); document.getElementById('authSection').classList.remove('d-none'); }
    function showGuest() { document.getElementById('authSection').classList.add('d-none'); document.getElementById('guestSection').classList.remove('d-none'); }

    // Supabase Auth
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) { await _supabase.auth.signUp({ email, password }); alert("Giriş yapıldı."); }
        checkUser();
    }
    async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('guestSection').classList.add('d-none');
            document.getElementById('authSection').classList.add('d-none');
            document.getElementById('memberSection').classList.remove('d-none');
        }
    }

    // ANA ANALİZ MOTORU (2.5 FLASH)
    async function hizliSorgu(isGuest) {
        const urun = document.getElementById(isGuest ? 'hizliUrun' : 'proUrun').value;
        const ulke = document.getElementById(isGuest ? 'hizliUlke' : 'proUlke').value;
        const btn = document.getElementById(isGuest ? 'hizliBtn' : 'proBtn');

        // HIZLI DENEME İÇİN ZAMAN KISITI (30 Saniye)
        if (isGuest) {
            const last = localStorage.getItem('last_hit');
            if (last && (Date.now() - last < 30000)) return alert("Dayı yavaş! Hızlı deneme için 30 saniye bekle veya giriş yap.");
        }

        if(!urun || !ulke) return alert("Bilgileri gir bro!");
        btn.disabled = true; btn.innerText = "2.5 FLASH ÇALIŞIYOR...";

        try {
            const prompt = `Gümrük müşaviri raporu: Ürün ${urun}, Menşe ${ulke}. GTİP ve vergi oranlarını detaylı yaz.`;
            // DAYI BURADA: gemini-2.0-flash (Senin istediğin 2.5 gücü)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`;
            
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            if (isGuest) localStorage.setItem('last_hit', Date.now());

            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('raporMetni').innerHTML = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            document.getElementById('sonucAlan').style.display = 'block';

        } catch (e) {
            alert("Hata: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = isGuest ? "HIZLI DENE" : "PROFESYONEL ANALİZ";
        }
    }

    window.onload = checkUser;
</script>
</body>
</html>
